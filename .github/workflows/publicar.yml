name: Publicar

# Cron de HORA EM HORA; a agenda real (4 Shorts + 1 longo por dia por canal)
# vive em publicador/config.json + state.json. Disparo fora de hora devida sai
# antes de qualquer chamada à API — não gasta cota.
#
# Repo PÚBLICO de propósito: minutos de Actions ilimitados (o render dos
# longos não caberia nos 2.000 min/mês do plano privado). Credenciais só nos
# Secrets — nunca no código.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Só decidir, sem renderizar nem publicar"
        type: boolean
        default: false

concurrency:
  group: publicar-3x
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Restaurar credenciais dos canais configurados
        env:
          ES_SECRET: ${{ secrets.YT_CLIENT_SECRET_ES }}
          ES_TOKEN: ${{ secrets.YT_TOKEN_ES }}
          EN_SECRET: ${{ secrets.YT_CLIENT_SECRET_EN }}
          EN_TOKEN: ${{ secrets.YT_TOKEN_EN }}
          PT_SECRET: ${{ secrets.YT_CLIENT_SECRET_PT }}
          PT_TOKEN: ${{ secrets.YT_TOKEN_PT }}
        run: |
          for lang in es en pt; do
            secret_var="$(echo $lang | tr a-z A-Z)_SECRET"
            token_var="$(echo $lang | tr a-z A-Z)_TOKEN"
            secret="${!secret_var}"
            token="${!token_var}"
            if [ -n "$secret" ] && [ -n "$token" ]; then
              mkdir -p "credenciais/$lang"
              printf '%s' "$secret" > "credenciais/$lang/client_secret.json"
              printf '%s' "$token" > "credenciais/$lang/token.json"
              chmod 600 credenciais/$lang/*
              echo "credenciais de $lang restauradas"
            else
              echo "canal $lang sem secrets; será pulado"
            fi
          done

      - name: Publicar o que está devido nesta hora
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python publicador/publicar.py --dry-run
          else
            python publicador/publicar.py
          fi

      - name: Alarme se não houver pacote para amanhã
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          amanha=$(date -u -d "+1 day" +%F)
          if ! ls -d fila/${amanha}-* >/dev/null 2>&1; then
            titulo="Fila sem pacote para $amanha — reabastecedor falhou"
            if [ -z "$(gh issue list --state open --search 'reabastecedor falhou in:title' --json number -q '.[].number')" ]; then
              gh issue create --title "$titulo" \
                --body "Não existe pacote em \`fila/\` para **$amanha**. Ver o workflow **Reabastecer** em Actions: provável poço de temas seco (\`conteudo/temas.json\`) ou Openverse fora do ar. Sem pacote, os 3 canais param nessa data."
            fi
          fi

      - name: Guardar estado (memória entre execuções)
        if: always()
        run: |
          rm -rf credenciais
          if [ -n "$(git status --porcelain publicador/state.json publicacoes.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add publicador/state.json publicacoes.md
            git commit -m "Publica (auto)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nada publicado nesta execução."
          fi
