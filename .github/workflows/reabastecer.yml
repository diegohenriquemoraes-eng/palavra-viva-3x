name: Reabastecer

# Garante pacote-do-dia para hoje + 2 dias. Só metadados (refs, títulos,
# URLs de imagem CC0) — o render pesado acontece na hora de publicar.
on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: reabastecer-3x
  cancel-in-progress: false

jobs:
  reabastecer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Criar pacotes que faltam
        id: gerar
        run: |
          set +e
          python produzir/reabastecer.py
          codigo=$?
          echo "codigo=$codigo" >> "$GITHUB_OUTPUT"
          if [ "$codigo" -eq 3 ]; then exit 0; fi
          exit $codigo

      - name: Commitar pacotes novos
        if: always()
        run: |
          if [ -n "$(git status --porcelain fila/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add fila/
            git commit -m "Reabastece pacotes (auto, nuvem)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nada a commitar."
          fi

      - name: Avisar se o poço de temas secou
        if: steps.gerar.outputs.codigo == '3'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          titulo="Poço de temas seco — adicionar temas a conteudo/temas.json"
          if [ -z "$(gh issue list --state open --search 'temas seco in:title' --json number -q '.[].number')" ]; then
            gh issue create --title "$titulo" \
              --body "Todos os temas de \`conteudo/temas.json\` já viraram pacote. Os canais publicam o que resta na fila e PARAM. Adicionar temas novos (1 longo + 4 shorts, títulos nos 3 idiomas, consultas de imagem) e dar push — o resto é automático."
          fi
