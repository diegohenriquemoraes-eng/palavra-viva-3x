name: Realinhar descrições

# Reescreve título/descrição/tags dos vídeos JÁ publicados de um canal para o
# padrão atual de publicador/config.json — usado quando a oferta de afiliado
# muda e os vídeos antigos precisam do bloco novo.
#
# Só manual: gasta 50 unidades de cota por vídeo e não deve concorrer com a
# publicação do dia. Rodar de preferência logo após a virada da cota (07:00
# UTC ~ meia-noite no Pacífico).
on:
  workflow_dispatch:
    inputs:
      canal:
        description: "Canal a realinhar (es/en/pt)"
        required: true
        default: "pt"
      dry_run:
        description: "Só listar o que mudaria"
        type: boolean
        default: true

concurrency:
  group: publicar-3x
  cancel-in-progress: false

jobs:
  realinhar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restaurar credenciais do canal
        env:
          ES_SECRET: ${{ secrets.YT_CLIENT_SECRET_ES }}
          ES_TOKEN: ${{ secrets.YT_TOKEN_ES }}
          EN_SECRET: ${{ secrets.YT_CLIENT_SECRET_EN }}
          EN_TOKEN: ${{ secrets.YT_TOKEN_EN }}
          PT_SECRET: ${{ secrets.YT_CLIENT_SECRET_PT }}
          PT_TOKEN: ${{ secrets.YT_TOKEN_PT }}
        run: |
          lang="${{ inputs.canal }}"
          secret_var="$(echo $lang | tr a-z A-Z)_SECRET"
          token_var="$(echo $lang | tr a-z A-Z)_TOKEN"
          secret="${!secret_var}"
          token="${!token_var}"
          if [ -z "$secret" ] || [ -z "$token" ]; then
            echo "canal $lang sem secrets"; exit 1
          fi
          mkdir -p "credenciais/$lang"
          printf '%s' "$secret" > "credenciais/$lang/client_secret.json"
          printf '%s' "$token" > "credenciais/$lang/token.json"
          chmod 600 credenciais/$lang/*

      - run: git pull --rebase --autostash origin main || true

      - name: Realinhar
        run: |
          args="--canal ${{ inputs.canal }}"
          [ "${{ inputs.dry_run }}" = "true" ] && args="$args --dry-run"
          echo "args:$args"
          python produzir/realinhar_publicados.py $args

      - name: Guardar estado
        if: always()
        run: |
          rm -rf credenciais
          if [ -n "$(git status --porcelain publicador/state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add publicador/state.json
            git commit -m "Realinha descrições (auto)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nada a guardar."
          fi
