name: Instagram Reels

# Cron de HORA EM HORA; a agenda real (rampa de 3 -> 8 Reels/dia, janela de
# horário e intervalo mínimo) vive em instagram/config.json + state.json.
# Fora da janela ou sem os secrets do Instagram, o script sai antes de renderizar
# — não gasta praticamente nada de runner.
#
# Independente do pipeline do YouTube (workflow "Publicar"): outro estado, outro
# conteúdo (Reels de versículo único). Não compartilham arquivos além do núcleo.
on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Só decidir, sem renderizar nem publicar"
        type: boolean
        default: false
      render_apenas:
        description: "Renderizar em saida/ sem publicar (não precisa de token)"
        type: boolean
        default: false
      forcar:
        description: "Ignorar a agenda e publicar agora"
        type: boolean
        default: false

concurrency:
  group: instagram-reels
  cancel-in-progress: false

jobs:
  reels:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # commit do state + upload do MP4 como asset de Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Conferir arquivos essenciais (Bíblia e fontes)
        run: |
          faltou=0
          for f in biblia/blivre.json instagram/versiculos.json instagram/config.json \
                   marca/fontes/BebasNeue-Regular.ttf marca/fontes/Montserrat-Bold.ttf; do
            if [ ! -s "$f" ]; then echo "FALTANDO: $f"; faltou=1; fi
          done
          [ "$faltou" = "0" ] && echo "todos os arquivos essenciais presentes"
          exit $faltou

      - name: Pegar o estado mais recente
        run: git pull --rebase --autostash origin main || true

      - name: Publicar o Reel devido nesta hora
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          args=""
          [ "${{ inputs.dry_run }}" = "true" ] && args="$args --dry-run"
          [ "${{ inputs.render_apenas }}" = "true" ] && args="$args --render-apenas"
          [ "${{ inputs.forcar }}" = "true" ] && args="$args --forcar"
          echo "args:$args"
          python instagram/publicar_ig.py $args

      - name: Guardar estado (memória entre execuções)
        if: always()
        run: |
          if [ -n "$(git status --porcelain instagram/state.json instagram/publicacoes_ig.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add instagram/state.json instagram/publicacoes_ig.md
            git commit -m "Instagram: publica Reel (auto)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Nada publicado nesta execução."
          fi
